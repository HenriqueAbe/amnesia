<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amnesia — Cinema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo">
                <img src="../static/imagens/amnesiaLogo.png" alt="Logo" class="logo-img">
            </div>
            
            <nav class="nav-main">
                <a href="/" class="nav-item active">🎁 Explorar</a>
                <a href="/meus-filmes" class="nav-item">🎬 Meus filmes</a>
            </nav>

            <div class="user-info">
                <span>Olá, <strong>{{ user.nome_usuario }}</strong></span>
                <img src="../static/imagens/Usuario.png" alt="User" class="avatar">
                
                <a href="/editar-perfil" class="icon-btn config-btn" title="Configurações">
                    <i class="fa-solid fa-gear"></i>
                </a>

                <a href="/logout" class="icon-btn logout-btn" title="Sair">
                    <i class="fa-solid fa-door-open"></i>
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="content-header">
            <h1>Explorar</h1>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Pesquisar filme...">
            </div>
        </div>

        <section class="movie-grid" id="movieGrid">
            {% for filme in filmes %}
            <div class="movie-card" onclick="window.location.href='/filmes/{{ filme.ID }}'">
                <div class="rating-badge">{{ filme.Nota_Media or '0.0' }} / 5 ★</div>
                
                <img src="{{ filme.Capa_URL if filme.Capa_URL else 'https://via.placeholder.com/400x600' }}" alt="{{ filme.Titulo }}">
                
                <div class="card-overlay">
                    <h3>{{ filme.Titulo }}</h3>
                    <p>{{ filme.Diretor }} • {{ filme.Ano_Lancamento }}</p>
                </div>
            </div>
            {% else %}
            <p>Nenhum filme encontrado no catálogo.</p>
            {% endfor %}
        </section>
    </main>

    <script src="../static/js/app.js"></script>
</body>
</html>
