<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amnesia — Cinema</title>
   <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}"/>
   <link rel="stylesheet" href="../../static/css/style.css">
</head>
<body>

<div class="wrap">

  <div class="left">
    <img src="../../static/imagens/amnesiaphoto.png" alt="Cinema">
    <div class="overlay"></div>
    <div class="left-info">
      <span class="tag">Amnesia</span>
      <p>O guia definitivo para os amantes do cinema</p>
    </div>
  </div>

  <div class="right">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="tab" id="tab-cad" onclick="switchTab('cad')">Cadastro</button>
    </div>

    <div class="slider-wrap">
      <div class="track" id="track">

        <!-- LOGIN -->
        <div class="panel">
          <h1>Acesse sua conta</h1>
          <p class="global-err" id="err-global"></p>

          <div class="field" id="f-le">
            <svg class="ico" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
            <input type="email" id="l-email" placeholder="E-mail" autocomplete="email" oninput="clearGlobal()">
            <p class="err" id="e-le"></p>
          </div>

          <div class="field" id="f-ls">
            <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="l-senha" placeholder="Senha" autocomplete="current-password" oninput="clearGlobal()">
            <button class="eye" type="button" onclick="togglePw('l-senha',this)">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <p class="err" id="e-ls"></p>
          </div>

          <button class="btn" onclick="doLogin()">Entrar</button>
        </div>

        <!-- CADASTRO -->
        <div class="panel">
          <h1>Crie sua conta</h1>

          <div class="field" id="f-cn">
            <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <input type="text" id="c-nome" placeholder="Nome" autocomplete="name" oninput="clrF('f-cn','e-cn')">
            <p class="err" id="e-cn"></p>
          </div>

          <div class="field" id="f-ce">
            <svg class="ico" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
            <input type="email" id="c-email" placeholder="E-mail" autocomplete="email" oninput="valEmail()">
            <p class="err" id="e-ce"></p>
          </div>

          <div class="field" id="f-cs">
            <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            
            <input type="password" 
            id="c-senha" 
            placeholder="Senha" 
            autocomplete="new-password" 
            oninput="valSenha()">

            <button class="eye" type="button" onclick="togglePw('c-senha',this)">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <p class="err" id="e-cs"></p>
          </div>

          <div class="hints" id="hints">
            <span id="h-len">8 caracteres</span>
            <span id="h-num">1 número</span>
            <span id="h-let">1 letra</span>
            <span id="h-sym">1 símbolo</span>
          </div>

          <div class="field" id="f-cc">
            <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="c-conf" placeholder="Confirme a senha" autocomplete="new-password" oninput="valConf()">
            <button class="eye" type="button" onclick="togglePw('c-conf',this)">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <p class="err" id="e-cc"></p>
          </div>

          <button class="btn" onclick="doCadastro()">Criar conta</button>
        </div>

      </div>
    </div>
  </div>
</div>


  <script src="../../static/js/app.js"></script>
  <script type="text/javascript" src="{{ url_for('static', path='js/app.js') }}"></script>
</body>
</html>
