<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amnesia — Cadastrar Filme</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard.css') }}">
</head>
<body>

    {% include 'geral/menu.html' %}

    <div class="admin-layout">
        <main class="admin-main">
            <div class="content-header">
                <div>
                    <h1>Cadastrar Novo Filme</h1>
                    <p class="page-sub">Preencha as informações para adicionar ao catálogo</p>
                </div>
                <button class="btn-sm" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
            </div>

            <div class="form-card">
                <form action="/admin/filmes/salvar" method="POST" class="admin-form">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>Título do Filme</label>
                            <input type="text" name="titulo" placeholder="Ex: Interestelar" required>
                        </div>

                        <div class="form-group">
                            <label>Gênero</label>
                            <select name="genero">
                                <option value="Ação">Ação</option>
                                <option value="Comédia">Comédia</option>
                                <option value="Drama">Drama</option>
                                <option value="Ficção">Ficção Científica</option>
                                <option value="Terror">Terror</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Ano de Lançamento</label>
                            <input type="number" name="ano" placeholder="2024" min="1895">
                        </div>

                        <div class="form-group">
                            <label>Nota (0 a 10)</label>
                            <input type="number" name="nota" step="0.1" placeholder="8.5" max="10">
                        </div>

                        <div class="form-group">
                            <label>URL do Pôster</label>
                            <input type="url" name="poster_url" placeholder="https://link-da-imagem.jpg">
                        </div>

                        <div class="form-group full-width">
                            <label>Sinopse</label>
                            <textarea name="sinopse" rows="4" placeholder="Breve resumo do filme..."></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="reset" class="btn-secondary">Limpar</button>
                        <button type="submit" class="btn-primary" onclick="showMessage('Filme salvo com sucesso!', 'success')">Salvar Filme</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="{{ url_for('static', path='js/dashboard.js') }}"></script>
</body>
</html>
