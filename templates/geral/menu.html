<!--Teste de Commit Em branch-->

<header class="main-header">
    <div class="header-top">
        <div class="logo-menu">
            <img src="../static/imagens/amnesiaLogo.png" alt="Logo" class="logo-img">
        </div>

        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="menu-icon">
            <i class="fa-solid fa-bars"></i>
        </label>

        <nav class="nav-main-menu">
            <div class="mobile-menu-title">Amnesia</div>

            <a href="/" class="nav-item-menu">🎁 Explorar</a>
            <a href="/meus-filmes" class="nav-item-menu">🎬 Meus filmes</a>
        </nav>

        <div class="user-info-menu">
            <span class="user-name-text">Olá, <strong id="userNameDisplay">
                    {% if user.Nome_Usuario %}
                    {{ user.Nome_Usuario }}
                    {% elif user.nome_usuario %}
                    {{ user.nome_usuario }}
                    {% else %}
                    Visitante
                    {% endif %}
                </strong></span>

            <div class="avatar-container-menu">
                <!-- Verifica se existe usuário logado e pega a imagem pela rota que você criou -->
                {% if user %}
                <!-- Tenta pegar user.id ou user.ID, dependendo de como o backend envia -->
                <img src="/avatar/{{ user.id or user.ID }}" id="menuAvatar" class="avatar-menu" alt="Perfil">
                {% else %}
                <!-- Fallback para visitante -->
                <img src="../static/imagens/Usuario.png" id="menuAvatar" class="avatar-menu" alt="Visitante">
                {% endif %}
            </div>

            <a href="/editar-perfil" class="icon-btn config-btn" title="Configurações">
                <i class="fa-solid fa-gear"></i>
            </a>

            <a href="/logout" class="icon-btn logout-btn" title="Sair">
                <i class="fa-solid fa-door-open"></i>
            </a>
        </div>
    </div>
    </div>
</header>

<script src="{{ url_for('static', path='js/menu.js')}}"></script>
