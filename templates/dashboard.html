<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Dashboard</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard.css') }}">

</head>
<body>

    {% include 'geral/menu.html' %}

    <div class="admin-layout">
        <main class="admin-main">
            <div class="content-header">
                <h1>Dashboard</h1>
                <p class="page-sub">Visão geral do sistema — última atualização agora</p>
            </div>

            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-icon purple"><i class="fa-solid fa-users"></i></div>
                    <div class="metric-label">Usuários cadastrados</div>
                    <div class="metric-value">{{ total_usuarios if total_usuarios else '0' }}</div>
                </div>
                </div>

            <div class="content-grid">
                <div class="table-card">
                    <div class="table-card-header">
                        <span>Usuários recentes</span>
                        <a href="{{ url_for('admin_usuarios') }}" class="btn-sm">Ver todos</a>
                    </div>
                    </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', path='js/dashboard.js') }}"></script></body>
</html>
