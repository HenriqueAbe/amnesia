<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Filmes — Amnesia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/menu.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/meus_filmes.css') }}">
</head>

<body>

    {% include 'geral/menu.html' %}

    <main class="container-movie">
        <header class="content-header">
            <div>
                <h1>Minha Biblioteca</h1>
                <p class="page-sub">Filmes que guardaste ou já assististe</p>
            </div>
        </header>

        <div class="filters-row">
            <button class="filter-chip active" onclick="filtrarStatus('todos', this)">
                Todos <span class="count">2</span>
            </button>
            <button class="filter-chip" onclick="filtrarStatus('assistido', this)">
                Assistidos
            </button>
            <button class="filter-chip" onclick="filtrarStatus('quero', this)">
                Quero Assistir
            </button>
        </div>

        <div class="movie-grid" id="favGrid">

            <div class="fav-card" data-status="assistido">
                <div class="fav-card-poster">
                    <img src="" alt="Capa do Filme">
                    <span class="status-badge status-watched">Assistido</span>
                    <button class="remove-btn" onclick="removerFavorito(this)">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
                <div class="fav-card-body">
                    <h3 class="fav-card-title">Oppenheimer</h3>
                    <div class="fav-card-footer">
                        <span class="my-rating"><i class="fa-solid fa-star"></i> 10/10</span>
                    </div>
                </div>
            </div>

            <div class="fav-card" data-status="quero">
                <div class="fav-card-poster">
                    <img src="" alt="Capa do Filme">
                    <span class="status-badge status-want">Quero Assistir</span>
                    <button class="remove-btn" onclick="removerFavorito(this)">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
                <div class="fav-card-body">
                    <h3 class="fav-card-title">Duna: Parte 2</h3>
                    <div class="fav-card-footer">
                        <span class="my-rating">Sem nota</span>
                    </div>
                </div>
            </div>

            <a href="/" class="add-card">
                <i class="fa-solid fa-plus"></i>
                <span>Explorar novos filmes</span>
            </a>
        </div>

        <div id="emptyState" style="display: none;" class="empty-state">
            <i class="fa-solid fa-film"></i>
            <p>Nenhum filme encontrado nesta categoria.</p>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="{{ url_for('static', path='js/menu.js')}}"></script>
    <script src="{{ url_for('static', path='js/meus_filmes.js') }}"></script>
    <script src="{{ url_for('static', path='js/utils.js') }}"></script>
    <script src="{{ url_for('static', path='js/comentarios.js') }}"></script>
</body>

</html>
