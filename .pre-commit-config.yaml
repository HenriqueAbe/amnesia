repos:
  - repo: local
    hooks:
      - id: conventional-commit-msg
        name: conventional-commit-msg
        language: pygrep
        entry: '(?s)^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9._/-]+\))?!?: .+(\n.*)?$'
        args: [--multiline, --negate]
        stages: [commit-msg]
